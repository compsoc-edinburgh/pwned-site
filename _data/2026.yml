    - title: "Doom on a Printer!? - Exploiting the Lexmark CX532adwe"
      abstract: "Joesph will be talking about the vulnerability research and exploit development process at Interrupt Labs, and their pwn2own submission for the Lexmark CX532adwe."
      speaker:
        name: "Joseph B"
        bio: "Interrupt Labs"
    - title: "We've done paperclips, now what?"
      abstract: "Join Viktor as he talks about his journey from touching a game console for the first time, to learning how to microsolder and unlock new features in proprietary firmware"
      speaker:
        name: "Viktor"
        bio: "Former SIGINT"
    - title: "Hacking the hackers, Vulnerabilities in Open Source C2 Frameworks"
      abstract: "As open-source command-and-control (C2) frameworks like Sliver, Havoc, and Mythic surge in popularity, their surprisingly large attack surfaces are creating unique opportunities for \"hack back\" exploits against offensive operators themselves. We will explore the architecture of these tools and demonstrate a series of vulnerabilities ranging from auth bypasses to a SSRF-to-RCE chain that allows a compromising an agent and pivoting straight into the team server. We will conclude by analysing the architectural root causes behind these flaws and exploring what the evolving landscape of offensive tooling means for both practitioners and defenders."
      speaker:
        name: "Laurence Tennant"
        bio: "Co-founder of Cryptohack"
    - title: "Hacking in the age of vibecoding (Workshop)"
      abstract: "Vibecoding is now producing multi-million-line codebases. To demonstrate how to hack such software, I vibecoded a blockchain node! Blockchain nodes are among the densest demonstrations of interdisciplinary engineering, combining Cryptography, Consensus, VMs, Databases, Game Theory, Networking, and more. Try to keep a vibecoded blockchain node up while exploits are getting thrown at it every few minutes. Longest-running node gets a prize!"
      speaker:
        name: "Michael Debono"
        bio: "OtterSec"
    - title: "From Exploit to Alert: A Detection Engineer's Guide to Threat Intel"
      abstract: "A threat actor exploits a known vulnerability, gets evicted, then returns 18 days later to deploy ransomware in under 90 minutes. Using a real DFIR report, this talk walks through how detection engineers turn threat intelligence into detections that actually work."
      speaker:
        name: "Steve Cooper"
        bio: "DetectionFlow"
    - title: "Application Security in the age of cloud automation"
      abstract: "In today's highly automated cloud environments web vulnerabilities can quickly escalate beyond the application layer and into a devastating cloud-wide compromise. Join me as we scrutinize broken security boundaries through the lens of identity exposure, SSRF, CI/CD exploitation, and cloud-native persistence. We'll wrap-up with defensive strategies to help teams build resilient applications to prevent a web bug becoming a catastrophic cloud breach."
      speaker:
        name: "Simardeep Singh"
        bio: "Warwick University"
    - title: "Hacking Satellites: Cybersecurity in the Space Domain"
      abstract: "Have you ever wondered how to defend the final frontier from cyber-attacks? This talk will immerse you in the space domain and explain why protecting space is important. We’ll go through some real-world attacks (aka hacking satellites) and the implications, following through to best practice protection and going through a space-oriented cyber defensive framework We’ll wrap up speaking about training pathways and how you can get involved."
      speaker:
        name: "Ciara Brown"
        bio: "PhD Student at the University of Edinburgh"
