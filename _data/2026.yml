    - title: "Hacking in the age of vibecoding (Workshop)"
      abstract: "Vibecoding is now producing multi-million-line codebases. To demonstrate how to hack such software, I vibecoded a blockchain node! Blockchain nodes are among the densest demonstrations of interdisciplinary engineering, combining Cryptography, Consensus, VMs, Databases, Game Theory, Networking, and more. Try to keep a vibecoded blockchain node up while the lecturer exploits it every few minutes. Longest-running node gets a prize!
        <br /><br /> A single bug can liquidate billions of dollars in an instant. No cringe, silly smart contracts, only low-level knowledge! "
      speaker:
        name: "Michael Debono"
        bio: "OtterSec"
    - title: "From Exploit to Alert: A Detection Engineer's Guide to Threat Intel"
      abstract: "A threat actor exploits a known vulnerability, gets evicted, then returns 18 days later to deploy ransomware in under 90 minutes. Using a real DFIR report, this talk walks through how detection engineers turn threat intelligence into detections that actually work."
      speaker:
        name: "Steve Cooper"
        bio: "DetectionFlow"
    - title: "Application Security in the age of cloud automation"
      abstract: "Web application vulnerabilities are often viewed as isolated issues with limited impact. In modern cloud environments, this assumption no longer holds true. As organizations increasingly rely on automation-driven web applications to manage infrastructure, deploy services, and perform routine operational tasks, application flaws can directly translate into cloud-wide compromise. This talk examines how common web application weaknesses can escalate beyond the application layer and break critical cloud security boundaries. Through four focused attack scenarios  identity and token exposure, internal service abuse via SSRF, CI/CD deployment trust exploitation, and cloud-native persistence mechanisms the session illustrates how trust assumptions introduced during application design and implementation are abused in real-world environments. Rather than showcasing isolated exploits, the presentation focuses on systemic design and implementation failures that emerge as applications take on greater responsibility for automation and control within cloud platforms. It highlights why traditional threat models often underestimate the resulting blast radius and how these risks are amplified by automated workflows. The session concludes with practical, application-first defensive strategies, helping teams design and deploy web applications that limit cloud impact when failures occur, ensuring that a single web bug does not become a cloud breach."
      speaker:
        name: "Simardeep Singh"
        bio: "Warwick University"
    - title: "Hacking Satellites: Cybersecurity in the Space Domain"
      abstract: "Have you ever wondered how to defend the final frontier from cyber-attacks? This talk will immerse you in the space domain and explain why protecting space is important. We’ll go through some real-world attacks (aka hacking satellites) and the implications, following through to best practice protection and going through a space-oriented cyber defensive framework We’ll wrap up speaking about training pathways and how you can get involved."
      speaker:
        name: "Ciara Brown"
        bio: "PhD Student at the University of Edinburgh"
